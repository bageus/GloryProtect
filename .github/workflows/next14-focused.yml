name: NEXT-14 focused validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: next14-focused-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6.2"

jobs:
  next14-scenarios:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            --output /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 \
            "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
            /usr/local/bin/godot

      - name: Import project
        run: timeout 120s godot --headless --path . --import

      - name: Runtime scenarios
        run: timeout 90s godot --headless --path . --script res://tests/unit/combat_anchor_runtime_scenarios.gd

      - name: Catalog scenarios
        run: timeout 90s godot --headless --path . --script res://tests/unit/combat_anchor_catalog_scenarios.gd

      - name: Active catalog scenarios
        run: timeout 90s godot --headless --path . --script res://tests/unit/active_upgrade_catalog_scenarios.gd

      - name: Operation scenarios
        run: timeout 90s godot --headless --path . --script res://tests/integration/combat_anchor_operation_scenarios.gd

      - name: Specialization scenarios
        run: timeout 90s godot --headless --path . --script res://tests/integration/combat_anchor_specialization_scenarios.gd

      - name: Upgrade routing scenarios
        run: timeout 90s godot --headless --path . --script res://tests/integration/combat_anchor_upgrade_routing_scenarios.gd
