name: Diagnose Godot scenarios

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: diagnose-godot-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6.2"

jobs:
  suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            --output /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 \
            "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
            /usr/local/bin/godot

      - name: Run suite and capture status
        id: suite
        continue-on-error: true
        shell: bash
        run: |
          set +e
          bash tools/run_godot_scenarios.sh
          status=$?
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Godot logs
        uses: actions/upload-artifact@v4
        with:
          name: godot-suite-logs
          path: test-results/godot

      - name: Fail when suite failed
        shell: bash
        run: test "${{ steps.suite.outputs.status }}" = "0"
