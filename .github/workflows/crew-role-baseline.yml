name: Crew role baseline comparison

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/crew-role-baseline.yml

permissions:
  contents: write

env:
  GODOT_VERSION: "4.6.2"

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        ref: [main, fix/crew-command-panel-104]
    steps:
      - name: Checkout ref
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.ref }}
      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location --retry 3 \
            --output /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 \
            "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
            /usr/local/bin/godot
          godot --headless --path . --import >/tmp/import.log 2>&1
      - name: Run crew role scenario
        shell: bash
        run: |
          timeout --signal=TERM --kill-after=5s 90s \
            godot --headless --path . \
            --script res://tests/integration/crew_role_scenarios.gd

  cleanup:
    needs: compare
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: fix/crew-command-panel-104
      - name: Remove comparison workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/crew-role-baseline.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove crew role comparison workflow"
          git push origin HEAD:fix/crew-command-panel-104
