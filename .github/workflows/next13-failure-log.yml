name: NEXT-13 failure log

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/next13-failure-log.yml

permissions:
  contents: write

env:
  GODOT_VERSION: "4.6.2"

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout NEXT-13 branch
        uses: actions/checkout@v4
        with:
          ref: issue-26-anchorless-control
      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location --retry 3 \
            --output /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 \
            "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
            /usr/local/bin/godot
      - name: Run suite and preserve log
        shell: bash
        run: |
          set +e
          bash tools/run_godot_scenarios.sh > /tmp/next13-suite.log 2>&1
          echo "$?" > /tmp/next13-suite.status
          exit 0
      - name: Upload log
        uses: actions/upload-artifact@v4
        with:
          name: next13-failure-log
          path: |
            /tmp/next13-suite.log
            /tmp/next13-suite.status

  cleanup:
    needs: capture
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout NEXT-13 branch
        uses: actions/checkout@v4
        with:
          ref: issue-26-anchorless-control
      - name: Remove diagnostic workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/next13-failure-log.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove NEXT-13 failure workflow"
          git push origin HEAD:issue-26-anchorless-control
