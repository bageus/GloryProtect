name: Panel source artifact

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/panel-source-artifact.yml

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: fix/crew-command-panel-104
      - name: Upload panel source
        uses: actions/upload-artifact@v4
        with:
          name: crew-command-panel-source
          path: scripts/ui/crew_command_panel.gd

  cleanup:
    needs: export
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: fix/crew-command-panel-104
      - name: Remove source workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/panel-source-artifact.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove panel source workflow"
          git push origin HEAD:fix/crew-command-panel-104
