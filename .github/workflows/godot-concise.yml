name: Godot concise diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/godot-concise.yml

permissions:
  contents: write

env:
  GODOT_VERSION: "4.6.2"

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: fix/crew-command-panel-104
      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location --retry 3 \
            --output /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 \
            "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
            /usr/local/bin/godot
      - name: Run concise suite
        shell: bash
        run: |
          set +e
          bash tools/run_godot_scenarios.sh > /tmp/suite.log 2>&1
          status=$?
          tail -n 100 /tmp/suite.log
          exit "$status"

  cleanup:
    needs: diagnose
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: fix/crew-command-panel-104
      - name: Remove concise workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/godot-concise.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove concise diagnostics"
          git push origin HEAD:fix/crew-command-panel-104
