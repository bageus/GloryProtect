name: Runner provisioning probe

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/runner-probe.yml
  workflow_dispatch:

permissions:
  contents: read

# This workflow intentionally avoids checkout and third-party actions.
jobs:
  standard-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Confirm standard runner startup
        run: |
          echo "ubuntu-latest runner started"
          uname -a

  slim-runner:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - name: Confirm slim runner startup
        run: |
          echo "ubuntu-slim runner started"
          uname -a

  file-size-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run guard against public main archive
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            https://github.com/bageus/GloryProtect/archive/refs/heads/main.tar.gz \
            | tar -xz --strip-components=1
          python3 tools/check_file_sizes.py
