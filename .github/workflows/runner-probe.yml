name: NEXT-13 diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/runner-probe.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  godot-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GODOT_VERSION: "4.6.2"
    steps:
      - name: Checkout clean NEXT-13 branch
        uses: actions/checkout@v4
        with:
          ref: issue-26-anchorless-control

      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location --retry 3 \
            --output /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 \
            "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
            /usr/local/bin/godot

      - name: Run scenarios and capture output
        id: scenarios
        shell: bash
        run: |
          set +e
          bash tools/run_godot_scenarios.sh 2>&1 | tee /tmp/godot-scenarios.log
          status=${PIPESTATUS[0]}
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload complete scenario log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: next-13-godot-log
          path: /tmp/godot-scenarios.log
          if-no-files-found: error

      - name: Return scenario status
        shell: bash
        run: exit "${{ steps.scenarios.outputs.status }}"
