name: Godot concise check

on:
  pull_request:
    branches: [main]
    paths:
      - scripts/ui/crew_command_panel.gd
      - scripts/ui/crew_command_panel_view.gd
      - .github/workflows/godot-tail.yml

permissions:
  contents: read

env:
  GODOT_VERSION: "4.6.2"

jobs:
  concise:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 --output /tmp/godot.zip "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
      - name: Run suite
        shell: bash
        run: |
          set +e
          bash tools/run_godot_scenarios.sh > /tmp/suite.log 2>&1
          code=$?
          tail -n 120 /tmp/suite.log
          exit "$code"
