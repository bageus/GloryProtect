name: Medic emergency targeted validation

on:
  pull_request:
    branches: [main]
    paths:
      - tests/integration/medic_emergency_cycle_scenarios.gd
      - .github/workflows/medic-emergency-targeted.yml

permissions:
  contents: write

env:
  GODOT_VERSION: "4.6.2"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: fix/medic-emergency-medical-cell
      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location --retry 3 \
            --output /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 \
            "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
            /usr/local/bin/godot
          godot --headless --path . --import >/tmp/import.log 2>&1
      - name: Run medic emergency scenario
        shell: bash
        run: |
          timeout --signal=TERM --kill-after=5s 90s \
            godot --headless --path . \
            --script res://tests/integration/medic_emergency_cycle_scenarios.gd

  cleanup:
    needs: validate
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: fix/medic-emergency-medical-cell
      - name: Remove targeted workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/medic-emergency-targeted.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove medic emergency validation workflow"
          git push origin HEAD:fix/medic-emergency-medical-cell
