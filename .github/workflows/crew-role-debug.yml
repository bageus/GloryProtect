name: Crew role debug

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/crew-role-debug.yml

permissions:
  contents: write

env:
  GODOT_VERSION: "4.6.2"

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: fix/crew-role-scenario-running-state
      - name: Instrument scenario
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tests/integration/crew_role_scenarios.gd')
          text = path.read_text(encoding='utf-8')
          old = '\troles.request_assignment(1, CrewRole.Id.DRIVER)\n'
          new = '''\troles.assignment_rejected.connect(
\t\tfunc(defender_id: int, role_id: int, reason: StringName) -> void:
\t\t\tprint("DEBUG rejected defender=", defender_id, " role=", role_id, " reason=", reason)
\t)
\tprint("DEBUG before owner=", roles.get_role_owner(CrewRole.Id.DRIVER), " role0=", roles.get_assignment(0).current_role, " state0=", roles.get_assignment(0).state, " role1=", roles.get_assignment(1).current_role, " state1=", roles.get_assignment(1).state)
\troles.request_assignment(1, CrewRole.Id.DRIVER)
\tprint("DEBUG after owner=", roles.get_role_owner(CrewRole.Id.DRIVER), " role1=", roles.get_assignment(1).current_role, " target1=", roles.get_assignment(1).target_role, " state1=", roles.get_assignment(1).state)
'''
          if old not in text:
              raise RuntimeError('assignment request not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location --retry 3 \
            --output /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 \
            "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
            /usr/local/bin/godot
          godot --headless --path . --import >/tmp/import.log 2>&1
      - name: Run scenario and save log
        shell: bash
        run: |
          set +e
          timeout --signal=TERM --kill-after=5s 20s \
            godot --headless --path . \
            --script res://tests/integration/crew_role_scenarios.gd \
            > /tmp/crew-role-debug.log 2>&1
          echo "$?" > /tmp/crew-role-debug.status
          exit 0
      - name: Upload debug log
        uses: actions/upload-artifact@v4
        with:
          name: crew-role-debug-log
          path: |
            /tmp/crew-role-debug.log
            /tmp/crew-role-debug.status

  cleanup:
    needs: debug
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: fix/crew-role-scenario-running-state
      - name: Remove debug workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/crew-role-debug.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove crew role debug workflow"
          git push origin HEAD:fix/crew-role-scenario-running-state

# retrigger
