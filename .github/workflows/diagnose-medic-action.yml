name: Diagnose selected scenarios

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GODOT_VERSION: "4.6.2"

jobs:
  selected-scenarios:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            --output /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 \
            "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
            /usr/local/bin/godot
      - name: Import project
        run: timeout 120s godot --headless --path . --import
      - name: Medic action priority
        run: timeout 90s godot --headless --path . --script res://tests/integration/medic_field_action_priority_scenarios.gd
      - name: Medic run reset
        run: timeout 90s godot --headless --path . --script res://tests/integration/medic_run_reset_scenarios.gd
      - name: Medic runtime reset cycle
        run: timeout 90s godot --headless --path . --script res://tests/integration/medic_runtime_reset_cycle_scenarios.gd
      - name: Medic station relocation
        run: timeout 90s godot --headless --path . --script res://tests/integration/medic_station_relocation_scenarios.gd
      - name: Medic temporary action modifiers
        run: timeout 90s godot --headless --path . --script res://tests/integration/medic_stimulant_scenarios.gd
      - name: Capture counterattack scenario
        id: counterattack
        continue-on-error: true
        shell: bash
        run: |
          set +e
          timeout 90s godot --headless --path . \
            --script res://tests/integration/melee_counterattack_scenarios.gd \
            > counterattack.log 2>&1
          status=$?
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload counterattack log
        uses: actions/upload-artifact@v4
        with:
          name: counterattack-log
          path: counterattack.log
      - name: Fail when counterattack scenario failed
        shell: bash
        run: test "${{ steps.counterattack.outputs.status }}" = "0"
