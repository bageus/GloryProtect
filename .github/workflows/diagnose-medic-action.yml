name: Diagnose medic action priority

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GODOT_VERSION: "4.6.2"

jobs:
  medic-action:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            --output /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 \
            "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
            /usr/local/bin/godot
      - name: Import project
        run: timeout 120s godot --headless --path . --import
      - name: Run scenario and capture output
        id: scenario
        continue-on-error: true
        shell: bash
        run: |
          set +e
          timeout --signal=TERM --kill-after=5s 90s \
            godot --headless --path . \
            --script res://tests/integration/medic_field_action_priority_scenarios.gd \
            > medic-action.log 2>&1
          status=$?
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload full scenario log
        uses: actions/upload-artifact@v4
        with:
          name: medic-action-log
          path: medic-action.log
      - name: Fail when scenario failed
        shell: bash
        run: |
          test "${{ steps.scenario.outputs.status }}" = "0"
