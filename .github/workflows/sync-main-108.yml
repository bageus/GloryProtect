name: Sync main into PR 108

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/sync-main-108.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/crew-command-panel-104
          fetch-depth: 0
      - name: Update branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit origin/main
          rm .github/workflows/sync-main-108.yml
          git add -A
          git commit --amend --no-edit
          git push origin HEAD:fix/crew-command-panel-104
