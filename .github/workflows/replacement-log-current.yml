name: Replacement current log

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/replacement-log-current.yml

permissions:
  contents: write

env:
  GODOT_VERSION: "4.6.2"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout test branch
        uses: actions/checkout@v4
        with:
          ref: fix/crew-replacement-scenario-stability
      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location --retry 3 \
            --output /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 \
            "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
            /usr/local/bin/godot
          godot --headless --path . --import >/tmp/import.log 2>&1
      - name: Run replacement scenario
        shell: bash
        run: |
          set +e
          timeout --signal=TERM --kill-after=5s 15s \
            godot --headless --path . \
            --script res://tests/integration/crew_replacement_scenarios.gd \
            > /tmp/replacement-current.log 2>&1
          echo "$?" > /tmp/replacement-current.status
          exit 0
      - name: Upload replacement log
        uses: actions/upload-artifact@v4
        with:
          name: replacement-current-log
          path: |
            /tmp/replacement-current.log
            /tmp/replacement-current.status

  cleanup:
    needs: check
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout test branch
        uses: actions/checkout@v4
        with:
          ref: fix/crew-replacement-scenario-stability
      - name: Remove log workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/replacement-log-current.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove current replacement log workflow"
          git push origin HEAD:fix/crew-replacement-scenario-stability
