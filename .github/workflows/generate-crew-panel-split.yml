name: Generate crew panel split

on:
  push:
    branches: [fix/crew-command-panel-104]
    paths:
      - tools/generate_crew_command_panel_split.py
      - .github/workflows/generate-crew-panel-split.yml
  pull_request:
    branches: [main]
    paths:
      - tools/generate_crew_command_panel_split.py
      - .github/workflows/generate-crew-panel-split.yml

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Generate split
        run: python3 tools/generate_crew_command_panel_split.py

      - name: Validate file-size guard
        run: python3 tools/check_file_sizes.py

      - name: Upload generated files
        uses: actions/upload-artifact@v4
        with:
          name: crew-panel-split
          path: |
            scripts/ui/crew_command_panel.gd
            scripts/ui/crew_command_panel_view.gd
          if-no-files-found: error
