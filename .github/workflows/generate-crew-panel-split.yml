name: Generate crew panel split

on:
  push:
    branches: [fix/crew-command-panel-104]
    paths:
      - tools/generate_crew_command_panel_split.py
      - .github/workflows/generate-crew-panel-split.yml
  pull_request:
    branches: [main]
    paths:
      - tools/generate_crew_command_panel_split.py
      - .github/workflows/generate-crew-panel-split.yml

permissions:
  contents: write

env:
  GODOT_VERSION: "4.6.2"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Generate split
        run: python3 tools/generate_crew_command_panel_split.py

      - name: Validate file-size guard
        run: python3 tools/check_file_sizes.py

      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            --output /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 \
            "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
            /usr/local/bin/godot

      - name: Parse generated scripts
        shell: bash
        run: |
          set -euo pipefail
          timeout --signal=TERM --kill-after=5s 120s \
            godot --headless --path . --import

      - name: Commit validated generated files
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'fix/crew-command-panel-104';
            const refName = `heads/${branch}`;
            const ref = await github.rest.git.getRef({ owner, repo, ref: refName });
            const parentSha = ref.data.object.sha;
            const parent = await github.rest.git.getCommit({
              owner,
              repo,
              commit_sha: parentSha,
            });
            const files = [
              'scripts/ui/crew_command_panel.gd',
              'scripts/ui/crew_command_panel_view.gd',
            ];
            const treeEntries = [];
            for (const path of files) {
              const blob = await github.rest.git.createBlob({
                owner,
                repo,
                content: fs.readFileSync(path, 'utf8'),
                encoding: 'utf-8',
              });
              treeEntries.push({
                path,
                mode: '100644',
                type: 'blob',
                sha: blob.data.sha,
              });
            }
            const tree = await github.rest.git.createTree({
              owner,
              repo,
              base_tree: parent.data.tree.sha,
              tree: treeEntries,
            });
            const commit = await github.rest.git.createCommit({
              owner,
              repo,
              message: 'refactor(ui): split crew command panel presentation',
              tree: tree.data.sha,
              parents: [parentSha],
            });
            await github.rest.git.updateRef({
              owner,
              repo,
              ref: refName,
              sha: commit.data.sha,
              force: false,
            });
            core.info(`Committed generated files as ${commit.data.sha}`);

      - name: Upload generated files
        uses: actions/upload-artifact@v4
        with:
          name: crew-panel-split
          path: |
            scripts/ui/crew_command_panel.gd
            scripts/ui/crew_command_panel_view.gd
          if-no-files-found: error
