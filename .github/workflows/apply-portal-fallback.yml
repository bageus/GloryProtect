name: Apply portal visual fallback

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-portal-fallback.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout NEXT-13 branch
        uses: actions/checkout@v4
        with:
          ref: issue-26-anchorless-control
      - name: Patch optional portal assets
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/platform/platform_visual_controller.gd')
          text = path.read_text(encoding='utf-8')

          preload_block = '''const PORTAL_TEXTURE: Texture2D = preload(
          \t"res://visual/objects/portal/asset_object_portal.png"
          )
          const PORTAL_SPAWN1_TEXTURE: Texture2D = preload(
          \t"res://visual/objects/portal/overlay_object_portal_spawn1.png"
          )
          const PORTAL_SPAWN2_TEXTURE: Texture2D = preload(
          \t"res://visual/objects/portal/overlay_object_portal_spawn2.png"
          )
          '''
          path_block = '''const PORTAL_TEXTURE_PATH := "res://visual/objects/portal/asset_object_portal.png"
          const PORTAL_SPAWN1_TEXTURE_PATH := "res://visual/objects/portal/overlay_object_portal_spawn1.png"
          const PORTAL_SPAWN2_TEXTURE_PATH := "res://visual/objects/portal/overlay_object_portal_spawn2.png"
          '''
          if preload_block not in text:
              raise RuntimeError('portal preload block not found')
          text = text.replace(preload_block, path_block, 1)

          visual_vars = '''var _surface_visual := PlatformSurfaceVisual.new()
          var _portal_source_rect: Rect2
          '''
          visual_vars_new = '''var _surface_visual := PlatformSurfaceVisual.new()
          var _portal_texture: Texture2D
          var _portal_spawn1_texture: Texture2D
          var _portal_spawn2_texture: Texture2D
          var _portal_source_rect: Rect2
          '''
          if visual_vars not in text:
              raise RuntimeError('portal visual variable anchor not found')
          text = text.replace(visual_vars, visual_vars_new, 1)

          bounds_block = '''\t_portal_source_rect = TextureRegionLayout.get_alpha_bounds(
          \t\tPORTAL_TEXTURE,
          \t\talpha_crop_threshold
          \t)
          \t_portal_spawn1_source_rect = TextureRegionLayout.get_alpha_bounds(
          \t\tPORTAL_SPAWN1_TEXTURE,
          \t\talpha_crop_threshold
          \t)
          \t_portal_spawn2_source_rect = TextureRegionLayout.get_alpha_bounds(
          \t\tPORTAL_SPAWN2_TEXTURE,
          \t\talpha_crop_threshold
          \t)
          '''
          bounds_new = '''\t_portal_texture = _load_optional_texture(PORTAL_TEXTURE_PATH)
          \t_portal_spawn1_texture = _load_optional_texture(PORTAL_SPAWN1_TEXTURE_PATH)
          \t_portal_spawn2_texture = _load_optional_texture(PORTAL_SPAWN2_TEXTURE_PATH)
          \t_portal_source_rect = _get_texture_bounds_or_fallback(
          \t\t_portal_texture,
          \t\tVector2(320.0, 420.0)
          \t)
          \t_portal_spawn1_source_rect = _get_texture_bounds_or_fallback(
          \t\t_portal_spawn1_texture,
          \t\tVector2(320.0, 420.0)
          \t)
          \t_portal_spawn2_source_rect = _get_texture_bounds_or_fallback(
          \t\t_portal_spawn2_texture,
          \t\tVector2(320.0, 420.0)
          \t)
          '''
          if bounds_block not in text:
              raise RuntimeError('portal bounds block not found')
          text = text.replace(bounds_block, bounds_new, 1)

          draw_block = '''\tdraw_texture_rect_region(
          \t\tPORTAL_TEXTURE,
          \t\tportal_rect,
          \t\t_portal_source_rect
          \t)
          '''
          draw_new = '''\tif _portal_texture != null:
          \t\tdraw_texture_rect_region(
          \t\t\t_portal_texture,
          \t\t\tportal_rect,
          \t\t\t_portal_source_rect
          \t\t)
          \telse:
          \t\t_draw_portal_fallback(portal_rect)
          '''
          if draw_block not in text:
              raise RuntimeError('portal draw block not found')
          text = text.replace(draw_block, draw_new, 1)
          text = text.replace('PORTAL_SPAWN1_TEXTURE,', '_portal_spawn1_texture,')
          text = text.replace('PORTAL_SPAWN2_TEXTURE,', '_portal_spawn2_texture,')

          overlay_anchor = ''') -> void:
          \tvar overlay_size: Vector2 = source_rect.size * object_asset_scale
          '''
          overlay_new = ''') -> void:
          \tif texture == null:
          \t\treturn
          \tvar overlay_size: Vector2 = source_rect.size * object_asset_scale
          '''
          if overlay_anchor not in text:
              raise RuntimeError('portal overlay function anchor not found')
          text = text.replace(overlay_anchor, overlay_new, 1)

          helper_anchor = '''func _on_visual_state_changed(_is_available: bool) -> void:
          \tqueue_redraw()
          '''
          helpers = '''func _load_optional_texture(resource_path: String) -> Texture2D:
          \tif not ResourceLoader.exists(resource_path):
          \t\treturn null
          \treturn load(resource_path) as Texture2D


          func _get_texture_bounds_or_fallback(
          \ttexture: Texture2D,
          \tfallback_size: Vector2
          ) -> Rect2:
          \tif texture == null:
          \t\treturn Rect2(Vector2.ZERO, fallback_size)
          \treturn TextureRegionLayout.get_alpha_bounds(texture, alpha_crop_threshold)


          func _draw_portal_fallback(portal_rect: Rect2) -> void:
          \tvar fill := Color(0.18, 0.62, 0.92, 0.22)
          \tvar outline := Color(0.45, 0.9, 1.0, 0.9)
          \tdraw_rect(portal_rect, fill, true)
          \tdraw_rect(portal_rect, outline, false, 3.0)


          func _on_visual_state_changed(_is_available: bool) -> void:
          \tqueue_redraw()
          '''
          if helper_anchor not in text:
              raise RuntimeError('helper insertion anchor not found')
          text = text.replace(helper_anchor, helpers, 1)
          path.write_text(text, encoding='utf-8')
          PY
          rm -f .github/workflows/apply-portal-fallback.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(visual): tolerate missing portal textures"
          git push origin HEAD:issue-26-anchorless-control
