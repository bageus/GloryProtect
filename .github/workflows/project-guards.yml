name: Project guards

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: project-guards-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GODOT_VERSION: "4.6.2"

jobs:
  file-size-limit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enforce 600-line limit
        run: python tools/check_file_sizes.py

  godot-scenarios:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            --output /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 \
            "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
            /usr/local/bin/godot
          godot --version

      - name: Run unit and integration scenarios
        run: bash tools/run_godot_scenarios.sh

      - name: Collect asset diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          diagnostics="test-results/godot/asset-diagnostics"
          mkdir -p "${diagnostics}/imports"
          find visual/objects -maxdepth 3 -type f -print | sort \
            > "${diagnostics}/object-files.txt"

          assets=(
            visual/objects/asset_anchor.png
            visual/objects/asset_captain_post_base.png
            visual/objects/asset_clamp.png
            visual/objects/asset_heal_post_base.png
            visual/objects/asset_winch_01.png
            visual/objects/portal/asset_portal_base.png
            visual/objects/portal/overlay_portal_spawn_01.png
            visual/objects/portal/overlay_portal_spawn_02.png
          )
          for asset in "${assets[@]}"; do
            if [[ -f "${asset}.import" ]]; then
              cp "${asset}.import" \
                "${diagnostics}/imports/$(echo "${asset}" | tr '/' '_').import"
            fi
          done

          git fetch --no-tags --depth=1 origin \
            a747a03fb8ba78f40356900fa6e23d3162bef932
          git show \
            a747a03fb8ba78f40356900fa6e23d3162bef932:visual/objects/asset_object_turret_post.png \
            > "${diagnostics}/asset_object_turret_post.png"
          git show \
            a747a03fb8ba78f40356900fa6e23d3162bef932:visual/objects/asset_object_turret_post.png.import \
            > "${diagnostics}/asset_object_turret_post.png.import"

      - name: Upload Godot scenario logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-scenario-logs
          path: test-results/godot
          if-no-files-found: warn
