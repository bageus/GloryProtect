name: Project guards

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: project-guards-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GODOT_VERSION: "4.6.2"

jobs:
  file-size-limit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enforce 600-line limit
        run: python tools/check_file_sizes.py

  godot-scenarios:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            --output /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 \
            "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
            /usr/local/bin/godot
          godot --version

      - name: Run unit and integration scenarios
        run: bash tools/run_godot_scenarios.sh

  crew-role-targeted:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location --retry 3 \
            --output /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 \
            "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
            /usr/local/bin/godot
          godot --headless --path . --import >/tmp/import.log 2>&1

      - name: Run targeted scenario
        shell: bash
        run: |
          set +e
          timeout --signal=TERM --kill-after=5s 30s \
            godot --headless --path . \
            --script res://tests/integration/crew_role_scenarios.gd \
            > /tmp/crew-role-targeted.log 2>&1
          echo "$?" > /tmp/crew-role-targeted.status
          exit 0

      - name: Upload targeted log
        uses: actions/upload-artifact@v4
        with:
          name: crew-role-targeted-log
          path: |
            /tmp/crew-role-targeted.log
            /tmp/crew-role-targeted.status
