name: Project guards

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GODOT_VERSION: "4.6.2"

jobs:
  file-size-limit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enforce 600-line limit
        run: python tools/check_file_sizes.py

  discover-scenarios:
    runs-on: ubuntu-latest
    outputs:
      scenarios: ${{ steps.discover.outputs.scenarios }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover Godot scenarios
        id: discover
        shell: bash
        run: |
          scenarios="$(find tests/unit tests/integration -type f -name '*_scenarios.gd' -print | sort | jq -R -s -c 'split("\n")[:-1]')"
          echo "scenarios=${scenarios}" >> "${GITHUB_OUTPUT}"

  godot-scenario:
    needs: discover-scenarios
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJSON(needs.discover-scenarios.outputs.scenarios) }}
    name: Godot — ${{ matrix.scenario }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            --output /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 \
            "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
            /usr/local/bin/godot
          godot --version

      - name: Run scenario
        run: godot --headless --path . --script "res://${{ matrix.scenario }}"
