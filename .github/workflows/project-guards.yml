name: Project guards

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-anchor-path-migration:
    if: github.head_ref == 'maintenance/roadmap-ci-sync'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Apply exact API migration
        run: python tools/ci_patch_anchor_path_calls.py

      - name: Commit migration when needed
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Anchor path calls are already migrated."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/boarding/boarding_enemy_controller.gd scripts/boarding/rope_saboteur_behavior.gd
          git commit -m "fix: update anchor path registry callers"
          git push origin HEAD:${{ github.head_ref }}
