name: Project guards

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  file-size-limit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enforce 600-line limit
        run: python tools/check_file_sizes.py
