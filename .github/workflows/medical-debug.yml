name: Medical debug

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/medical-debug.yml

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GODOT_VERSION: "4.6.2"
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: fix/crew-command-panel-104
      - name: Instrument medical scenario
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tests/integration/buildable_medical_station_scenarios.gd')
          text = path.read_text(encoding='utf-8')
          old = '\tassert(inventory.unlock(BuildableType.Id.MEDICAL_STATION) == 1)\n'
          new = '''\tprint("DEBUG before max=", inventory.balance.medical_station_max_count, " count=", inventory.get_unlocked_count(BuildableType.Id.MEDICAL_STATION))
\tvar unlock_result: int = inventory.unlock(BuildableType.Id.MEDICAL_STATION)
\tprint("DEBUG after result=", unlock_result, " count=", inventory.get_unlocked_count(BuildableType.Id.MEDICAL_STATION), " station=", grid.get_buildable_id_by_type(BuildableType.Id.MEDICAL_STATION))
\tassert(unlock_result == 1)
'''
          if old not in text:
              raise RuntimeError('unlock assertion not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location --retry 3 \
            --output /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 \
            "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
            /usr/local/bin/godot
          godot --headless --path . --import >/tmp/import.log 2>&1
      - name: Run targeted scenario
        shell: bash
        run: |
          set +e
          timeout --signal=TERM --kill-after=5s 30s \
            godot --headless --path . \
            --script res://tests/integration/buildable_medical_station_scenarios.gd \
            > /tmp/medical.log 2>&1
          status=$?
          cat /tmp/medical.log
          exit "$status"
      - name: Upload exact grid source
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exact-buildable-grid
          path: scripts/buildables

  cleanup:
    needs: debug
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: fix/crew-command-panel-104
      - name: Remove medical debug workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/medical-debug.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove medical debug workflow"
          git push origin HEAD:fix/crew-command-panel-104
