name: Apply panel visibility fix

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-panel-visibility-fix.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: fix/crew-command-panel-104
      - name: Fix panel visibility and clean workflow
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/ui/crew_command_panel.gd')
          text = path.read_text(encoding='utf-8')
          old = '\tvisible = _game_flow.state != GameFlowController.RunState.GAME_OVER\n'
          new = '''\tvisible = (
\t\t_game_flow.state != GameFlowController.RunState.GAME_OVER
\t\tand _game_flow.state != GameFlowController.RunState.CARD_SELECTION
\t)
'''
          if old not in text:
              raise RuntimeError('expected visibility condition not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          rm -f .github/workflows/apply-panel-visibility-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(ui): hide crew panel during card selection"
          git push origin HEAD:fix/crew-command-panel-104

# retrigger
